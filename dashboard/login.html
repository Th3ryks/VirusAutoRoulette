<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #1c1f26;
      --bg-card: #2a303c;
      --border: #3a4150;
      --text: #e8eaef;
      --muted: #9aa3b5;
      --accent: #7eb6ff;
      --danger: #d97a7a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Sora", sans-serif;
      background:
        radial-gradient(1000px 500px at 20% -10%, #2d3442 0%, transparent 55%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .box {
      width: 100%;
      max-width: 380px;
      background: linear-gradient(160deg, var(--bg-card) 0%, #242933 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 22px;
    }
    label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.22);
      color: var(--text);
      font: inherit;
      font-size: 1rem;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #12151a;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: wait; }
    .err {
      margin-top: 14px;
      color: var(--danger);
      font-size: 0.88rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <form class="box" id="form" autocomplete="current-password">
    <h1>Virus Roulette</h1>
    <p>Enter password to open the dashboard</p>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autofocus />
    <button type="submit" id="btn">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    const form = document.getElementById("form");
    const err = document.getElementById("err");
    const btn = document.getElementById("btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.textContent = "";
      btn.disabled = true;
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ password: document.getElementById("password").value }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          err.textContent = data.error || `HTTP ${res.status}`;
          btn.disabled = false;
          return;
        }
        window.location.href = "/";
      } catch (ex) {
        err.textContent = ex.message || "Login failed";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
